<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Assinatura - Saltum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --brand:#183215; --brand-hover:#0f1f0d; --brand-focus:rgba(24,50,21,.12); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f7fb;
    font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
    min-height: 100vh;
    color: #0f172a;
  }

  .page-header {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,.07);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }

  .header-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background .15s, color .15s;
  }
  .header-back:hover { background: #f1f5f9; color: #0f172a; }
  .header-back svg { width: 14px; height: 14px; }

  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.01em;
  }

  .header-spacer { width: 90px; }

  .main {
    max-width: 740px;
    margin: 32px auto 0;
    padding: 0 20px 60px;
  }

  .panel {
    background: #fff;
    padding: 28px 28px 24px;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,.07);
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.05);
    margin-bottom: 20px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }

  .grid label {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    gap: 6px;
    letter-spacing: 0.01em;
  }

  .grid input {
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13.5px;
    font-family: inherit;
    color: #0f172a;
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .grid input:hover { border-color: #cbd5e1; }
  .grid input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-focus); }

  .full { grid-column: 1 / -1; }

  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    letter-spacing: 0.01em;
  }
  .btn:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.2); }
  .btn:active { transform: translateY(0); }

  .btn.secondary {
    background: #f1f5f9;
    color: #475569;
    box-shadow: none;
    border: 1.5px solid #e2e8f0;
  }
  .btn.secondary:hover { background: #e2e8f0; color: #0f172a; box-shadow: none; transform: translateY(-1px); }

  .preview-panel {
    background: transparent;
    padding: 0;
  }

  .preview-label {
    font-size: 11.5px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 16px;
  }

  #signature-wrapper {
    max-width: 720px;
    margin: 0 auto;
  }

  .page-footer {
    text-align: center;
    padding: 36px 0 0;
    font-size: 12px;
    color: #94a3b8;
    font-weight: 500;
  }
  .page-footer strong { color: #64748b; font-weight: 700; }

  @media (max-width: 600px) {
    .main { padding: 0 12px 48px; margin-top: 16px; }
    .panel { padding: 20px 16px 18px; border-radius: 12px; }
    .preview-panel { padding: 0; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .grid input { min-height: 44px; font-size: 16px; }
    .header-spacer { display: none; }
    .btn { width: 100%; justify-content: center; padding: 13px 20px; font-size: 15px; min-height: 44px; }
    .actions { gap: 8px; }
    #signature-wrapper { overflow: hidden; }
  }
</style>
</head>
<body>

<header class="page-header">
  <a class="header-back" href="../index.html">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Voltar
  </a>
  <span class="header-title">Editor — Saltum</span>
  <span class="header-spacer"></span>
</header>

<div class="main">
<div class="panel">
  <div class="panel-title">Editar dados da assinatura — Saltum</div>
  <div class="grid">
    <label>Nome completo <input type="text" id="f-nome" value="Nome da pessoa"></label>
    <label>Cargo (opcional) <input type="text" id="f-cargo" value=""></label>
    <label>Celular / WhatsApp <input type="text" id="f-celular" value=""></label>
    <label>Telefone <input type="text" id="f-telefone" value=""></label>
    <label>Ramal (opcional) <input type="text" id="f-ramal" value="" placeholder="Ex.: 205"></label>
    <label class="full">E-mail <input type="text" id="f-email" value=""></label>
    <label class="full">Endereço <input type="text" id="f-endereco" value="Rua Tabapuã, 145 - 8 andar"></label>
    <label class="full">LinkedIn (opcional) <input type="text" id="f-linkedin" value="" placeholder="https://linkedin.com/in/usuario"></label>
    <label class="full">Mensagem ao clicar no WhatsApp (opcional) <input type="text" id="f-wamsg" value="" placeholder="Ex.: Olá! Cheguei pela assinatura de e-mail."></label>
  </div>
  <div class="actions">
    <button class="btn" onclick="copyHTML('owa')">Copiar para Outlook Web</button>
    <button class="btn secondary" onclick="copyHTML('desktop')">Copiar para Outlook Desktop</button>
    <button class="btn secondary" onclick="copyHTML('mac')">Copiar para Email do Mac</button>
  </div>
</div>

<div class="preview-panel">
  <div class="preview-label">Pré-visualização</div>
<div id="signature-wrapper" style="max-width:720px;margin:0 auto;">
<!-- ============================================================
     ASSINATURA SALTUM
     Mesmas proporções do modelo Solibem
     ============================================================ -->
<table id="signature" cellpadding="0" cellspacing="0" border="0"
  style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;border:1px solid #E0E0E0;">
  <tr>
    <td style="background:#FFFFFF;padding:0;vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;width:100%;">
        <tr>
          <td width="140" rowspan="2" valign="bottom" nowrap
              style="width:140px;padding:0 16px 18px 17px;vertical-align:bottom;background:#FFFFFF;white-space:nowrap;">
            <div id="s-nome"
                 style="font-size:14px;font-weight:900;color:#1a1a1a;font-family:Arial,Helvetica,sans-serif;line-height:1.25;white-space:nowrap;"></div>
            <div id="s-cargo-wrap" style="display:none;margin-top:4px;">
              <span id="s-cargo"
                    style="font-size:11px;font-weight:bold;color:#183215;font-family:Arial,Helvetica,sans-serif;"></span>
            </div>
          </td>
          <td align="right" valign="top"
              style="padding:20px 18px 0 0;vertical-align:top;text-align:right;background:#FFFFFF;">
            <div id="logo-saltum" style="color:#183215;font-weight:800;font-size:28px;font-family:Arial,Helvetica,sans-serif;line-height:1;white-space:nowrap;">Saltum</div>
          </td>
        </tr>
        <tr>
          <td align="right" valign="bottom"
              style="padding:28px 14px 18px 0;vertical-align:bottom;text-align:right;background:#FFFFFF;">
            <table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">
              <tr><td style="padding:1px 5px 3px 0;vertical-align:top;line-height:0;"><img id="icon-celular" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-celular" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:5px;vertical-align:top;line-height:16px;text-align:left;white-space:nowrap;"></td></tr>
              <tr><td style="padding:1px 5px 3px 0;vertical-align:top;line-height:0;"><img id="icon-telefone" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-telefone" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:5px;vertical-align:top;line-height:16px;text-align:left;white-space:nowrap;"></td></tr>
              <tr><td style="padding:1px 5px 3px 0;vertical-align:top;line-height:0;"><img id="icon-email" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-email" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:5px;vertical-align:top;line-height:16px;text-align:left;white-space:nowrap;"></td></tr>
              <tr><td style="padding:1px 5px 0 0;vertical-align:top;line-height:0;"><img id="icon-endereco" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-endereco" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;vertical-align:top;line-height:14px;text-align:left;overflow-wrap:break-word;"></td></tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#183215" height="16"
        style="background-color:#183215;height:16px;font-size:0;line-height:0;">&nbsp;</td>
  </tr>
</table>
</div>
</div><!-- /preview-panel -->

<div class="page-footer">
  <span>Desenvolvido por <strong>BAM</strong></span>
</div>
</div><!-- /main -->

<script>
function mkIcon(s) {
  return 'data:image/svg+xml;base64,' + btoa(s);
}

var ICONS = {
  celular: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#777" stroke-width="1.3">' +
    '<rect x="3.5" y="0.5" width="7" height="13" rx="1.2"/>' +
    '<line x1="5.5" y1="2.5" x2="8.5" y2="2.5" stroke-linecap="round" stroke-width="1"/>' +
    '<circle cx="7" cy="11.5" r="0.85" fill="#777" stroke="none"/>' +
    '</svg>'
  ),
  telefone: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">' +
    '<path d="M3.2 2C2.6 2 2 2.6 2 3.3C2 5.8 4.5 9.3 6.5 11.2C8.5 13.1 12 14 12.7 14C13.4 14 14 13.4 14 12.8L12.8 11.2L11.2 12.2C10.6 12.2 9 11.2 8 10.1C7 9 6 7.4 6 6.8L7.6 5.2L5.8 2Z" fill="#777"/>' +
    '</svg>'
  ),
  email: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#777" stroke-width="1.3">' +
    '<rect x="0.5" y="2.5" width="13" height="9.5" rx="0.5"/>' +
    '<polyline points="0.5,2.5 7,8.5 13.5,2.5"/>' +
    '</svg>'
  ),
  endereco: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">' +
    '<path d="M7 0.5C4.5 0.5 2.5 2.6 2.5 5.2C2.5 8.8 7 13.8 7 13.8C7 13.8 11.5 8.8 11.5 5.2C11.5 2.6 9.5 0.5 7 0.5Z" fill="#777"/>' +
    '<circle cx="7" cy="5.2" r="1.7" fill="white"/>' +
    '</svg>'
  )
};

document.getElementById('icon-celular').src   = ICONS.celular;
document.getElementById('icon-telefone').src  = ICONS.telefone;
document.getElementById('icon-email').src     = ICONS.email;
document.getElementById('icon-endereco').src  = ICONS.endereco;
update();
scaleSignature();

function update() {
  document.getElementById('s-nome').textContent     = document.getElementById('f-nome').value;
  var cargo = document.getElementById('f-cargo').value.trim();
  document.getElementById('s-cargo').textContent    = cargo;
  document.getElementById('s-cargo-wrap').style.display = cargo ? '' : 'none';
  document.getElementById('s-celular').textContent  = document.getElementById('f-celular').value;
  // Ramal ao lado do telefone, igual ao export
  var tel = document.getElementById('f-telefone').value;
  var ram = (document.getElementById('f-ramal').value || '').trim();
  document.getElementById('s-telefone').textContent = tel + (tel.trim() && ram ? ' - Ramal ' + ram : '');
  document.getElementById('s-email').textContent    = document.getElementById('f-email').value;
  document.getElementById('s-endereco').textContent = document.getElementById('f-endereco').value;
}
['f-nome','f-cargo','f-celular','f-telefone','f-ramal','f-email','f-endereco'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', update);
});

// Formatação automática de telefone brasileiro
function fmtPhone(v){
  var d=v.replace(/\D/g,'').slice(0,11);
  if(!d.length) return '';
  if(d.length<=2) return '('+d;
  if(d.length<=6) return '('+d.slice(0,2)+') '+d.slice(2);
  if(d.length<=10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
}
['f-celular','f-telefone'].forEach(function(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('input',function(){
    var formatted=fmtPhone(this.value);
    if(formatted!==this.value) this.value=formatted;
  });
});

// Autocomplete de domínio de e-mail
(function(){
  var DOMAINS = ['saltum.com.br','gmail.com','hotmail.com'];
  var input = document.getElementById('f-email');
  if(!input) return;
  var box = document.createElement('ul');
  box.style.cssText = 'position:fixed;z-index:9999;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;margin:0;padding:4px 0;list-style:none;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none;';
  document.body.appendChild(box);
  function pos(){ var r=input.getBoundingClientRect(); box.style.top=(r.bottom+4)+'px'; box.style.left=r.left+'px'; box.style.minWidth=r.width+'px'; }
  function show(){
    var val=input.value, at=val.lastIndexOf('@');
    if(at===-1){box.style.display='none';return;}
    var pre=val.slice(0,at), after=val.slice(at+1).toLowerCase();
    var hits=DOMAINS.filter(function(d){return d.indexOf(after)===0;});
    if(!hits.length){box.style.display='none';return;}
    box.innerHTML='';
    hits.forEach(function(d){
      var li=document.createElement('li');
      li.textContent=pre+'@'+d;
      li.tabIndex=0;
      li.style.cssText='padding:7px 14px;cursor:pointer;font-size:13px;color:#0f172a;white-space:nowrap;';
      function pick(e){e.preventDefault();input.value=pre+'@'+d;input.dispatchEvent(new Event('input'));box.style.display='none';input.focus();}
      li.addEventListener('mousedown',pick);
      li.addEventListener('keydown',function(e){if(e.key==='Enter')pick(e);if(e.key==='Escape'){box.style.display='none';input.focus();}});
      li.addEventListener('mouseover',function(){this.style.background='#f1f5f9';});
      li.addEventListener('mouseout',function(){this.style.background='';});
      box.appendChild(li);
    });
    pos(); box.style.display='block';
  }
  input.addEventListener('input',show);
  input.addEventListener('focus',show);
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape') box.style.display='none';
    if(e.key==='ArrowDown'&&box.style.display!=='none'){e.preventDefault();var f=box.querySelector('li');if(f)f.focus();}
  });
  document.addEventListener('click',function(e){if(e.target!==input&&!box.contains(e.target))box.style.display='none';});
  window.addEventListener('scroll',function(){if(box.style.display!=='none')pos();},true);
  window.addEventListener('resize',function(){if(box.style.display!=='none')pos();});
})();

function scaleSignature(){var wrap=document.getElementById('signature-wrapper');var sig=document.getElementById('signature');if(!sig||!wrap)return;var w=wrap.getBoundingClientRect().width;var sw=parseInt(sig.getAttribute('width'))||500;if(w<sw){var s=w/sw;sig.style.transform='scale('+s+')';sig.style.transformOrigin='top left';wrap.style.height=Math.ceil(sig.offsetHeight*s)+'px';}else{sig.style.transform='';sig.style.transformOrigin='';wrap.style.height='';}}window.addEventListener('resize',scaleSignature);

// Copia HTML da assinatura — mode: 'owa'=Outlook Web | 'desktop'=Outlook Desktop | 'mac'=Mail do Mac (saida igual ao OWA)
async function copyHTML(mode) {
  var nome     = (document.getElementById('f-nome').value     || '').trim();
  var cargo    = (document.getElementById('f-cargo').value    || '').trim();
  var celular  = (document.getElementById('f-celular').value  || '').trim();
  var telefone = (document.getElementById('f-telefone').value || '').trim();
  var ramal    = (document.getElementById('f-ramal').value    || '').trim();
  var emailVal = (document.getElementById('f-email').value    || '').trim();
  var endereco = (document.getElementById('f-endereco').value || '').trim();
  var linkedin = (document.getElementById('f-linkedin').value || '').trim();
  var wamsg    = (document.getElementById('f-wamsg').value    || '').trim();

  var BASE      = 'https://bam-assessoria.github.io/Assinaturas/';
  // Ícones OPACOS com o branco do card já no fundo (SEM transparência): o Outlook clássico
  // (engine do Word antigo) achatava o alfa dos PNGs transparentes e mostrava só um
  // quadrado branco. 22x22 exibido a 11px = redução 2:1 exata (nítida no Word).
  var iCelular  = BASE + 'icons/celular-branco.png';
  var iTelefone = BASE + 'icons/telefone-branco.png';
  var iEmail    = BASE + 'icons/email-branco.png';
  var iEndereco = BASE + 'icons/endereco-branco.png';
  // Tiles 1x1 hospedados (PNG opaco) em TODAS as células → trava a cor contra a inversão do dark mode (OWA).
  var BG_WHITE  = BASE + 'bg/bg-white.png';
  var BG_BAR    = BASE + 'bg/bg-saltum.png';
  var BRAND     = '#183215';
  var WBG = 'background-color:#FFFFFF;background-image:url(\'' + BG_WHITE + '\');background-repeat:repeat;';
  var BBG = 'background-color:' + BRAND + ';background-image:url(\'' + BG_BAR + '\');background-repeat:repeat;';

  // Contatos clicáveis: celular abre WhatsApp, telefone disca, email compõe, endereço abre o mapa.
  function onlyDigits(s){ return (s || '').replace(/\D/g, ''); }
  function telHref(s){ var d = onlyDigits(s); if(!d) return ''; if(d.length <= 11) d = '55' + d; return 'tel:+' + d; }
  function waHref(s, msg){ var d = onlyDigits(s); if(!d) return ''; if(d.length <= 11) d = '55' + d; var u = 'https://wa.me/' + d; if(msg) u += '?text=' + encodeURIComponent(msg); return u; }
  function mapsHref(s){ return s ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s) : ''; }
  function urlHref(s){ s = (s || '').trim(); if(!s) return ''; return /^https?:\/\//i.test(s) ? s : 'https://' + s; }
  function linkTxt(href, text){ return href ? '<a href="' + href + '" style="color:#333333;text-decoration:none;">' + text + '</a>' : text; }

  // Linha de contato ÚNICA pros 3 botões (Desktop/OWA/Mac): ícone em TD separada do texto —
  // inline desalinha no engine do Word do DESTINATÁRIO (o botão só escolhe onde COLAR; quem
  // recebe renderiza com o cliente que tiver). Mesma estrutura da pré-visualização.
  // wrap=false → nowrap (celular/telefone/E-MAIL nunca quebram; a coluna alarga pro conteúdo);
  // wrap=true → quebra SÓ em espaço (endereço). Sem word-break:break-word, que deixava
  // OWA/celular esmagar a coluna e partir o e-mail no meio ("...com.b" + "r" na linha de baixo).
  function row(icon, content, wrap) {
    if (!content) return '';
    var wrapCss    = wrap ? 'overflow-wrap:break-word;' : 'white-space:nowrap;';
    var nowrapAttr = wrap ? '' : ' nowrap';
    return '<tr>'
      + '<td width="18" valign="top" bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="width:18px;padding:1px 5px 3px 0;vertical-align:top;line-height:0;' + WBG + '">'
      + '<img src="' + icon + '" width="11" height="11" alt="" border="0" style="display:block;border:0;width:11px;height:11px;">'
      + '</td>'
      + '<td valign="top"' + nowrapAttr + ' bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding:0 0 5px 0;vertical-align:top;text-align:left;line-height:16px;' + WBG + wrapCss + '">'
      + content + '</td></tr>';
  }

  // Nome/cargo com overflow-wrap (quebra em espaço), NUNCA word-break — senão a coluna do
  // nome pode ser esmagada em tela estreita e partir o nome no meio, como acontecia com o e-mail.
  var cargoHtml = cargo
    ? '<p style="margin:4px 0 0 0;padding:0;font-size:11px;font-weight:700;color:' + BRAND + ';font-family:Arial,Helvetica,sans-serif;overflow-wrap:break-word;">' + cargo + '</p>'
    : '';
  var celHtml   = celular  ? linkTxt(waHref(celular, wamsg), celular) : '';
  // Ramal é só texto ao lado do telefone (o link tel: disca o número base)
  var telTxt    = telefone + (ramal ? ' - Ramal ' + ramal : '');
  var telHtml   = telefone ? linkTxt(telHref(telefone), telTxt)      : '';
  var emailHtml = emailVal ? linkTxt('mailto:' + emailVal, emailVal) : '';
  var endHtml   = endereco ? linkTxt(mapsHref(endereco), endereco)   : '';
  // Nome vira link clicável pro LinkedIn quando o campo está preenchido.
  var liHref    = urlHref(linkedin);
  var nomeHtml  = liHref
    ? '<a href="' + liHref + '" style="color:#1a1a1a;text-decoration:none;">' + nome + '</a>'
    : nome;

  // Saída IDÊNTICA nos 3 botões — só as instruções de onde colar mudam no aviso.
  // E-mail SEM wrap (fica sempre em 1 linha); endereço quebra apenas em espaços.
  var contatos = row(iCelular, celHtml) + row(iTelefone, telHtml) + row(iEmail, emailHtml) + row(iEndereco, endHtml, true);

  // Card BRANCO com borda fina cinza (destaca no fundo branco do e-mail). Largura adaptável (max 470px).
  // Logo = texto "Saltum" (Arial, cor da marca). Tile branco em todas as células trava o dark mode no OWA.
  var html = '<table cellpadding="0" cellspacing="0" border="0"'
    + ' style="border-collapse:collapse;border:1px solid #E0E0E0;font-family:Arial,Helvetica,sans-serif;max-width:470px;">'
    + '<tr>'
    + '<td bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="' + WBG + 'padding:0;vertical-align:top;">'
    // width=100% na tabela interna: se algum cliente (Outlook clássico) alargar o card
    // além do conteúdo, o miolo estica junto e nome/logo/contatos mantêm o alinhamento.
    + '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;width:100%;">'
    + '<tr>'
    // NOME SEMPRE EM 1 LINHA: white-space:nowrap no <p> + o atributo nowrap na TD (o Word
    // ignora o CSS aqui, só obedece o atributo). O width:140 vira PISO, não teto: a coluna
    // cresce pro tamanho do nome e o card se ajusta sozinho.
    + '<td width="140" rowspan="2" valign="bottom" nowrap bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="width:140px;padding:0 16px 18px 17px;vertical-align:bottom;white-space:nowrap;' + WBG + '">'
    + '<p style="margin:0;padding:0;font-size:14px;font-weight:900;color:#1a1a1a;font-family:Arial,Helvetica,sans-serif;line-height:1.25;white-space:nowrap;">' + nomeHtml + '</p>'
    + cargoHtml + '</td>'
    + '<td align="right" valign="top" bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="padding:20px 18px 0 0;vertical-align:top;text-align:right;' + WBG + '">'
    + '<p style="margin:0;padding:0;font-size:28px;font-weight:800;color:' + BRAND + ';font-family:Arial,Helvetica,sans-serif;line-height:1;white-space:nowrap;">Saltum</p>'
    + '</td>'
    + '</tr>'
    + '<tr>'
    + '<td align="right" valign="bottom" bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="padding:28px 14px 18px 0;vertical-align:bottom;text-align:right;' + WBG + '">'
    + '<table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">'
    + contatos
    + '</table>'
    + '</td>'
    + '</tr>'
    + '<tr><td colspan="2" height="4" bgcolor="#FFFFFF" background="' + BG_WHITE + '" style="height:4px;font-size:0;line-height:0;' + WBG + '"></td></tr>'
    + '</table>'
    + '</td>'
    + '</tr>'
    + '<tr>'
    + '<td bgcolor="' + BRAND + '" background="' + BG_BAR + '" height="16" style="' + BBG + 'height:16px;font-size:0;line-height:0;">&nbsp;</td>'
    + '</tr>'
    + '</table>';

  try {
    await navigator.clipboard.write([ new ClipboardItem({ 'text/html': new Blob([html], { type: 'text/html' }) }) ]);
    var msg = mode === 'desktop'
      ? 'Copiado! Cole no Outlook Desktop: Arquivo > Opções > Email > Assinaturas.'
      : mode === 'mac'
      ? 'Copiado! No Mail do Mac: Mail > Ajustes > Assinaturas. Deixe DESMARCADO "Sempre coincidir com a fonte padrão da mensagem".'
      : 'Copiado! Cole no Outlook Web: Configurações > Email > Assinatura de email.';
    alert(msg);
  } catch(e) {
    var div = document.createElement('div');
    div.contentEditable = 'true';
    div.innerHTML = html;
    div.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;';
    document.body.appendChild(div);
    var sel = window.getSelection();
    var range = document.createRange();
    range.selectNodeContents(div);
    sel.removeAllRanges();
    sel.addRange(range);
    try { document.execCommand('copy'); } catch(e2) {}
    sel.removeAllRanges();
    document.body.removeChild(div);
    alert('Assinatura copiada.');
  }
}
</script>
</body>
</html>
