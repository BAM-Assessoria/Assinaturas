<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Assinatura - Bracel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root { --brand:#E8621A; --brand-hover:#c85218; --brand-focus:rgba(232,98,26,.15); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f7fb;
    font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
    min-height: 100vh;
    color: #0f172a;
  }

  .page-header {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,.07);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }

  .header-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background .15s, color .15s;
  }
  .header-back:hover { background: #f1f5f9; color: #0f172a; }
  .header-back svg { width: 14px; height: 14px; }

  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.01em;
  }

  .header-spacer { width: 90px; }

  .main {
    max-width: 740px;
    margin: 32px auto 0;
    padding: 0 20px 60px;
  }

  .panel {
    background: #fff;
    padding: 28px 28px 24px;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,.07);
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.05);
    margin-bottom: 20px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }

  .grid label {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    gap: 6px;
    letter-spacing: 0.01em;
  }

  .grid input {
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13.5px;
    font-family: inherit;
    color: #0f172a;
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .grid input:hover { border-color: #cbd5e1; }
  .grid input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-focus); }

  .full { grid-column: 1 / -1; }

  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    letter-spacing: 0.01em;
  }
  .btn:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.2); }
  .btn:active { transform: translateY(0); }

  .btn.secondary {
    background: #f1f5f9;
    color: #475569;
    box-shadow: none;
    border: 1.5px solid #e2e8f0;
  }
  .btn.secondary:hover { background: #e2e8f0; color: #0f172a; box-shadow: none; transform: translateY(-1px); }

  .preview-panel {
    background: transparent;
    padding: 0;
  }

  .preview-label {
    font-size: 11.5px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 16px;
  }

  #signature-wrapper {
    max-width: 720px;
    margin: 0 auto;
  }

  .page-footer {
    text-align: center;
    padding: 36px 0 0;
    font-size: 12px;
    color: #94a3b8;
    font-weight: 500;
  }
  .page-footer strong { color: #64748b; font-weight: 700; }

  @media (max-width: 600px) {
    .main { padding: 0 12px 48px; margin-top: 16px; }
    .panel { padding: 20px 16px 18px; border-radius: 12px; }
    .preview-panel { padding: 0; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .grid input { min-height: 44px; font-size: 16px; }
    .header-spacer { display: none; }
    .btn { width: 100%; justify-content: center; padding: 13px 20px; font-size: 15px; min-height: 44px; }
    .actions { gap: 8px; }
    #signature-wrapper { overflow: hidden; }
  }
</style>
</head>
<body>

<header class="page-header">
  <a class="header-back" href="../index.html">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Voltar
  </a>
  <span class="header-title">Editor — Bracel</span>
  <span class="header-spacer"></span>
</header>

<div class="main">
<div class="panel">
  <div class="panel-title">Editar dados da assinatura — Bracel</div>
  <div class="grid">
    <label>Nome completo <input type="text" id="f-nome" value="Roberto Cremonezi"></label>
    <label>Cargo (opcional) <input type="text" id="f-cargo" value=""></label>
    <label>Celular / WhatsApp <input type="text" id="f-celular" value=""></label>
    <label>Telefone <input type="text" id="f-telefone" value=""></label>
    <label class="full">E-mail <input type="text" id="f-email" value=""></label>
    <label class="full">Endereço <input type="text" id="f-endereco" value="Estrada Tenente Marques, 5.558"></label>
  </div>
  <div class="actions">
    <button class="btn" onclick="downloadPNG()">Baixar como PNG</button>
    <button class="btn secondary" onclick="copyHTML()">Copiar HTML</button>
  </div>
</div>

<div class="preview-panel">
  <div class="preview-label">Pré-visualização</div>
<div id="signature-wrapper" style="max-width:720px;margin:0 auto;">
<!-- ============================================================
     ASSINATURA BRACEL
     Largura: 460px | Area principal: 320px | Barra: 26px
     Para duplicar: trocar logo, cor #E8621A e poligono SVG do fundo
     ============================================================ -->
<table id="signature" cellpadding="0" cellspacing="0" border="0" width="600"
  style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;background:#F4F4F4;table-layout:fixed;">
  <tr>
    <td id="bg-td"
        style="padding:0;background-repeat:no-repeat;background-position:top left;vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0" width="600"
             style="border-collapse:collapse;table-layout:fixed;">
        <tr>
          <td width="240" rowspan="2" valign="bottom"
              style="width:240px;padding:0 0 24px 33px;vertical-align:bottom;">
            <div id="s-nome"
                 style="font-size:17px;font-weight:900;color:#1a1a1a;font-family:Arial,Helvetica,sans-serif;line-height:1.25;white-space:nowrap;"></div>
            <div id="s-cargo-wrap" style="display:none;margin-top:5px;">
              <span id="s-cargo"
                    style="font-size:14px;font-weight:bold;color:#E8621A;font-family:Arial,Helvetica,sans-serif;"></span>
            </div>
          </td>
          <td width="360" align="right" valign="top" height="160"
              style="width:360px;height:160px;padding:14px 20px 0 0;vertical-align:top;text-align:right;">
            <div style="width:340px;margin-left:auto;margin-right:-20px;margin-top:-70px;">
              <img id="logo-bracel" src="LogoBracel.png" alt="Bracel" width="370" style="display:block;border:0;width:370px;">
            </div>
          </td>
        </tr>
        <tr>
          <td valign="bottom" style="padding:0 20px 24px 0;vertical-align:bottom;">
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin-left:115px;">
              <tr><td style="padding:0 8px 8px 0;vertical-align:middle;line-height:0;"><img id="icon-celular" src="" width="13" height="13" alt="" style="display:block;border:0;"></td><td id="s-celular" style="font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:10px;vertical-align:middle;white-space:nowrap;"></td></tr>
              <tr><td style="padding:0 8px 8px 0;vertical-align:middle;line-height:0;"><img id="icon-telefone" src="" width="13" height="13" alt="" style="display:block;border:0;"></td><td id="s-telefone" style="font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:8px;vertical-align:middle;"></td></tr>
              <tr><td style="padding:0 8px 8px 0;vertical-align:top;padding-top:1px;line-height:0;"><img id="icon-email" src="" width="13" height="13" alt="" style="display:block;border:0;"></td><td id="s-email" style="font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:8px;vertical-align:top;max-width:280px;word-break:break-word;line-height:1.45;"></td></tr>
              <tr><td style="padding:0 8px 0 0;vertical-align:top;padding-top:2px;line-height:0;"><img id="icon-endereco" src="" width="13" height="13" alt="" style="display:block;border:0;"></td><td id="s-endereco" style="font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;vertical-align:top;max-width:280px;word-break:break-word;line-height:1.45;"></td></tr>
            </table>
          </td>
        </tr>
        <tr><td colspan="2" height="1" style="height:1px;font-size:0;line-height:0;"></td></tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#EB7927" height="20"
        style="background-color:#EB7927;height:20px;font-size:0;line-height:0;">&nbsp;</td>
  </tr>
</table>
</div>
</div><!-- /preview-panel -->

<div class="page-footer">
  <span>Desenvolvido por <strong>BAM</strong></span>
</div>
</div><!-- /main -->

<script>
// Cria data URI de icone SVG a partir de string SVG (somente ASCII)
function mkIcon(s) {
  return 'data:image/svg+xml;base64,' + btoa(s);
}

// Icones em SVG inline (cinza neutro #777)
var ICONS = {
  celular: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#777" stroke-width="1.3">' +
    '<rect x="3.5" y="0.5" width="7" height="13" rx="1.2"/>' +
    '<line x1="5.5" y1="2.5" x2="8.5" y2="2.5" stroke-linecap="round" stroke-width="1"/>' +
    '<circle cx="7" cy="11.5" r="0.85" fill="#777" stroke="none"/>' +
    '</svg>'
  ),
  telefone: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">' +
    '<path d="M3.2 2C2.6 2 2 2.6 2 3.3C2 5.8 4.5 9.3 6.5 11.2C8.5 13.1 12 14 12.7 14C13.4 14 14 13.4 14 12.8L12.8 11.2L11.2 12.2C10.6 12.2 9 11.2 8 10.1C7 9 6 7.4 6 6.8L7.6 5.2L5.8 2Z" fill="#777"/>' +
    '</svg>'
  ),
  email: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#777" stroke-width="1.3">' +
    '<rect x="0.5" y="2.5" width="13" height="9.5" rx="0.5"/>' +
    '<polyline points="0.5,2.5 7,8.5 13.5,2.5"/>' +
    '</svg>'
  ),
  endereco: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">' +
    '<path d="M7 0.5C4.5 0.5 2.5 2.6 2.5 5.2C2.5 8.8 7 13.8 7 13.8C7 13.8 11.5 8.8 11.5 5.2C11.5 2.6 9.5 0.5 7 0.5Z" fill="#777"/>' +
    '<circle cx="7" cy="5.2" r="1.7" fill="white"/>' +
    '</svg>'
  )
};

// Fundo SVG: poligono cinza (superior/esquerdo) + branco (inferior/direito)
// Diagonal: de (370,0) no topo ate (162,320) na base
var BG = mkIcon(
  '<svg xmlns="http://www.w3.org/2000/svg" width="600" height="350"><rect width="600" height="350" fill="#DBDBDB"/><polygon points="0,0 558,0 62,370 0,320" fill="#F4F4F4"/></svg>'
);

// Aplica fundo e icones ao carregar
var bgTd = document.getElementById('bg-td');
bgTd.style.backgroundImage = 'url(' + BG + ')';
bgTd.style.backgroundSize  = '600px 350px';

document.getElementById('icon-celular').src   = ICONS.celular;
document.getElementById('icon-telefone').src  = ICONS.telefone;
document.getElementById('icon-email').src     = ICONS.email;
document.getElementById('icon-endereco').src  = ICONS.endereco;
update();

// Atualiza preview em tempo real
function update() {
  document.getElementById('s-nome').textContent     = document.getElementById('f-nome').value;
  var cargo = document.getElementById('f-cargo').value.trim();
  document.getElementById('s-cargo').textContent    = cargo;
  document.getElementById('s-cargo-wrap').style.display = cargo ? '' : 'none';
  document.getElementById('s-celular').textContent  = document.getElementById('f-celular').value;
  document.getElementById('s-telefone').textContent = document.getElementById('f-telefone').value;
  document.getElementById('s-email').textContent    = document.getElementById('f-email').value;
  document.getElementById('s-endereco').textContent = document.getElementById('f-endereco').value;
}
['f-nome','f-cargo','f-celular','f-telefone','f-email','f-endereco'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', update);
});

// Formatação automática de telefone brasileiro
function fmtPhone(v){
  var d=v.replace(/\D/g,'').slice(0,11);
  if(!d.length) return '';
  if(d.length<=2) return '('+d;
  if(d.length<=6) return '('+d.slice(0,2)+') '+d.slice(2);
  if(d.length<=10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
}
['f-celular','f-telefone'].forEach(function(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('input',function(){
    var formatted=fmtPhone(this.value);
    if(formatted!==this.value) this.value=formatted;
  });
});

// Autocomplete de domínio de e-mail
(function(){
  var DOMAINS = ['bracel.com.br','gmail.com','hotmail.com'];
  var input = document.getElementById('f-email');
  if(!input) return;
  var box = document.createElement('ul');
  box.style.cssText = 'position:fixed;z-index:9999;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;margin:0;padding:4px 0;list-style:none;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none;';
  document.body.appendChild(box);
  function pos(){ var r=input.getBoundingClientRect(); box.style.top=(r.bottom+4)+'px'; box.style.left=r.left+'px'; box.style.minWidth=r.width+'px'; }
  function show(){
    var val=input.value, at=val.lastIndexOf('@');
    if(at===-1){box.style.display='none';return;}
    var pre=val.slice(0,at), after=val.slice(at+1).toLowerCase();
    var hits=DOMAINS.filter(function(d){return d.indexOf(after)===0;});
    if(!hits.length){box.style.display='none';return;}
    box.innerHTML='';
    hits.forEach(function(d){
      var li=document.createElement('li');
      li.textContent=pre+'@'+d;
      li.tabIndex=0;
      li.style.cssText='padding:7px 14px;cursor:pointer;font-size:13px;color:#0f172a;white-space:nowrap;';
      function pick(e){e.preventDefault();input.value=pre+'@'+d;input.dispatchEvent(new Event('input'));box.style.display='none';input.focus();}
      li.addEventListener('mousedown',pick);
      li.addEventListener('keydown',function(e){if(e.key==='Enter')pick(e);if(e.key==='Escape'){box.style.display='none';input.focus();}});
      li.addEventListener('mouseover',function(){this.style.background='#f1f5f9';});
      li.addEventListener('mouseout',function(){this.style.background='';});
      box.appendChild(li);
    });
    pos(); box.style.display='block';
  }
  input.addEventListener('input',show);
  input.addEventListener('focus',show);
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape') box.style.display='none';
    if(e.key==='ArrowDown'&&box.style.display!=='none'){e.preventDefault();var f=box.querySelector('li');if(f)f.focus();}
  });
  document.addEventListener('click',function(e){if(e.target!==input&&!box.contains(e.target))box.style.display='none';});
  window.addEventListener('scroll',function(){if(box.style.display!=='none')pos();},true);
  window.addEventListener('resize',function(){if(box.style.display!=='none')pos();});
})();

// Exporta PNG (somente a assinatura)
function scaleSignature(){var wrap=document.getElementById('signature-wrapper');var sig=document.getElementById('signature');if(!sig||!wrap)return;var w=wrap.getBoundingClientRect().width;var sw=parseInt(sig.getAttribute('width'))||500;if(w<sw){var s=w/sw;sig.style.transform='scale('+s+')';sig.style.transformOrigin='top left';wrap.style.height=Math.ceil(sig.offsetHeight*s)+'px';}else{sig.style.transform='';sig.style.transformOrigin='';wrap.style.height='';}}window.addEventListener('resize',scaleSignature);

function downloadPNG() {
  html2canvas(document.getElementById('signature'), {scale:2, backgroundColor:null, useCORS:true}).then(function(canvas) {
    var link = document.createElement('a');
    var nome = document.getElementById('f-nome').value.replace(/[^a-z0-9]+/gi, '_').toLowerCase() || 'assinatura';
    link.download = 'assinatura_' + nome + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

// Copia HTML da assinatura (sem o painel de edicao)
async function copyHTML() {
  var nome     = (document.getElementById('f-nome').value     || '').trim();
  var cargo    = (document.getElementById('f-cargo').value    || '').trim();
  var celular  = (document.getElementById('f-celular').value  || '').trim();
  var telefone = (document.getElementById('f-telefone').value || '').trim();
  var emailVal = (document.getElementById('f-email').value    || '').trim();
  var endereco = (document.getElementById('f-endereco').value || '').trim();

  var BASE = 'https://bam-assessoria.github.io/Assinaturas/';
  var iCelular  = BASE + 'icons/celular.svg';
  var iTelefone = BASE + 'icons/telefone.svg';
  var iEmail    = BASE + 'icons/email.svg';
  var iEndereco = BASE + 'icons/endereco.svg';

  var logoUrl = 'https://bam-assessoria.github.io/Assinaturas/LogoBracel.png';

  function row(icon, content) {
    if (!content) return '';
    return '<tr><td style="font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;'
      + 'padding-bottom:5px;vertical-align:middle;white-space:nowrap;text-align:right;">'
      + '<img src="' + icon + '" width="13" height="13" alt="" style="display:inline;border:0;vertical-align:middle;margin-right:5px;">'
      + content + '</td></tr>';
  }

  var cargoHtml = cargo
    ? '<p style="margin:4px 0 0 0;padding:0;font-size:13px;font-weight:bold;color:#E8621A;font-family:Arial,Helvetica,sans-serif;">' + cargo + '</p>'
    : '';
  var emailHtml = emailVal
    ? '<a href="mailto:' + emailVal + '" style="color:#333333;text-decoration:none;">' + emailVal + '</a>'
    : '';

  var html =
    '<table cellpadding="0" cellspacing="0" border="0" width="520"'
    + ' style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;width:520px;">'
    + '<tr><td bgcolor="#DBDBDB" style="padding:0;background-color:#DBDBDB;'
    + 'background-image:url(' + BASE + 'bg/bracel.svg);'
    + 'background-size:520px 300px;background-repeat:no-repeat;background-position:top left;">'
    + '<table cellpadding="0" cellspacing="0" border="0" width="520" style="border-collapse:collapse;width:520px;">'
    + '<tr>'
    + '<td width="200" rowspan="2" valign="bottom" style="width:200px;padding:0 0 12px 26px;vertical-align:bottom;">'
    + '<p style="margin:0;padding:0;font-size:16px;font-weight:900;color:#1a1a1a;font-family:Arial,Helvetica,sans-serif;line-height:1.25;">' + nome + '</p>'
    + cargoHtml
    + '</td>'
    + '<td width="320" align="right" valign="top" height="153" style="width:320px;height:153px;padding:0;vertical-align:top;text-align:right;">'
    + '<div style="width:310px;height:153px;overflow:hidden;margin-left:auto;margin-right:-15px;">'
    + '<img src="' + logoUrl + '" alt="Bracel" width="310" height="207" style="display:block;border:0;width:310px;height:207px;margin-top:-50px;">'
    + '</div>'
    + '</td>'
    + '</tr>'
    + '<tr>'
    + '<td valign="bottom" style="padding:0 8px 8px 0;vertical-align:bottom;text-align:right;">'
    + '<table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">'
    + row(iCelular,  celular)
    + row(iTelefone, telefone)
    + row(iEmail,    emailHtml)
    + row(iEndereco, endereco)
    + '</table>'
    + '</td>'
    + '</tr>'
    + '</table>'
    + '</td></tr>'
    + '<tr><td bgcolor="#EB7927" height="14"'
    + ' style="background-color:#EB7927;height:14px;font-size:0;line-height:0;">&nbsp;</td></tr>'
    + '</table>';

  try {
    await navigator.clipboard.write([
      new ClipboardItem({ 'text/html': new Blob([html], { type: 'text/html' }) })
    ]);
    alert('Assinatura copiada! Cole no Gmail > Configuracoes > Assinatura.');
  } catch(e) {
    try { await navigator.clipboard.writeText(html); } catch(e2) {
      var ta = document.createElement('textarea');
      ta.value = html; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    alert('Assinatura copiada.');
  }
}
</script>
</body>
</html>
