<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Assinatura - Bracel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --brand:#E8621A; --brand-hover:#c85218; --brand-focus:rgba(232,98,26,.15); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f7fb;
    font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
    min-height: 100vh;
    color: #0f172a;
  }

  .page-header {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,.07);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }

  .header-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background .15s, color .15s;
  }
  .header-back:hover { background: #f1f5f9; color: #0f172a; }
  .header-back svg { width: 14px; height: 14px; }

  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.01em;
  }

  .header-spacer { width: 90px; }

  .main {
    max-width: 740px;
    margin: 32px auto 0;
    padding: 0 20px 60px;
  }

  .panel {
    background: #fff;
    padding: 28px 28px 24px;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,.07);
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.05);
    margin-bottom: 20px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }

  .grid label {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    gap: 6px;
    letter-spacing: 0.01em;
  }

  .grid input {
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13.5px;
    font-family: inherit;
    color: #0f172a;
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .grid input:hover { border-color: #cbd5e1; }
  .grid input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-focus); }

  .full { grid-column: 1 / -1; }

  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    letter-spacing: 0.01em;
  }
  .btn:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.2); }
  .btn:active { transform: translateY(0); }

  .btn.secondary {
    background: #f1f5f9;
    color: #475569;
    box-shadow: none;
    border: 1.5px solid #e2e8f0;
  }
  .btn.secondary:hover { background: #e2e8f0; color: #0f172a; box-shadow: none; transform: translateY(-1px); }

  .preview-panel {
    background: transparent;
    padding: 0;
  }

  .preview-label {
    font-size: 11.5px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 16px;
  }

  #signature-wrapper {
    max-width: 720px;
    margin: 0 auto;
  }

  .page-footer {
    text-align: center;
    padding: 36px 0 0;
    font-size: 12px;
    color: #94a3b8;
    font-weight: 500;
  }
  .page-footer strong { color: #64748b; font-weight: 700; }

  @media (max-width: 600px) {
    .main { padding: 0 12px 48px; margin-top: 16px; }
    .panel { padding: 20px 16px 18px; border-radius: 12px; }
    .preview-panel { padding: 0; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .grid input { min-height: 44px; font-size: 16px; }
    .header-spacer { display: none; }
    .btn { width: 100%; justify-content: center; padding: 13px 20px; font-size: 15px; min-height: 44px; }
    .actions { gap: 8px; }
    #signature-wrapper { overflow: hidden; }
  }
</style>
</head>
<body>

<header class="page-header">
  <a class="header-back" href="../index.html">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Voltar
  </a>
  <span class="header-title">Editor — Bracel</span>
  <span class="header-spacer"></span>
</header>

<div class="main">
<div class="panel">
  <div class="panel-title">Editar dados da assinatura — Bracel</div>
  <div class="grid">
    <label>Nome completo <input type="text" id="f-nome" value="Roberto Cremonezi"></label>
    <label>Cargo (opcional) <input type="text" id="f-cargo" value=""></label>
    <label>Celular / WhatsApp <input type="text" id="f-celular" value=""></label>
    <label>Telefone <input type="text" id="f-telefone" value=""></label>
    <label>Ramal (opcional) <input type="text" id="f-ramal" value="" placeholder="Ex.: 205"></label>
    <label class="full">E-mail <input type="text" id="f-email" value=""></label>
    <label class="full">Endereço <input type="text" id="f-endereco" value="Estrada Tenente Marques, 5.558"></label>
    <label class="full">LinkedIn (opcional) <input type="text" id="f-linkedin" value="" placeholder="https://linkedin.com/in/usuario"></label>
    <label class="full">Mensagem ao clicar no WhatsApp (opcional) <input type="text" id="f-wamsg" value="" placeholder="Ex.: Olá! Cheguei pela assinatura de e-mail."></label>
    <label class="full">Fundo do card <select id="f-fundo" style="padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13.5px;font-family:inherit;color:#0f172a;background:#fff;outline:none;cursor:pointer;">
      <option value="cinza">Cinza claro (atual)</option>
      <option value="branco">Branco com borda cinza</option>
    </select></label>
  </div>
  <div class="actions">
    <button class="btn" onclick="copyHTML('owa')">Copiar para Outlook Web</button>
    <button class="btn secondary" onclick="copyHTML('desktop')">Copiar para Outlook Desktop</button>
    <button class="btn secondary" onclick="copyHTML('classic')">Copiar para Outlook Antigo</button>
    <button class="btn secondary" onclick="copyHTML('mac')">Copiar para Email do Mac</button>
  </div>
</div>

<div class="preview-panel">
  <div class="preview-label">Pré-visualização</div>
<div id="signature-wrapper" style="margin:18px auto 0;text-align:center;">
<!-- Pré-visualização = mesma estrutura do export. IDs s-* atualizados por update(); fundo/borda por applyFundo(). -->
<!-- Fonte Arial no card (igual ao export): e-mail não carrega webfont, então quem recebe
     sempre vê Arial — o preview usa a mesma pra não mentir sobre o resultado. -->
<table id="signature" cellpadding="0" cellspacing="0" border="0"
  style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;display:inline-block;text-align:left;">
  <tr>
    <td id="s-card" style="background:#F4F4F4;padding:0;vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td rowspan="2" valign="bottom" nowrap
              style="padding:0 16px 15px 17px;vertical-align:bottom;white-space:nowrap;">
            <div id="s-nome" style="font-size:12px;font-weight:900;color:#1a1a1a;font-family:Arial,Helvetica,sans-serif;line-height:1.25;white-space:nowrap;"></div>
            <div id="s-cargo-wrap" style="display:none;margin-top:4px;">
              <span id="s-cargo" style="font-size:11px;font-weight:700;color:#E8621A;font-family:Arial,Helvetica,sans-serif;"></span>
            </div>
          </td>
          <td align="right" valign="top"
              style="padding:8px 19px 0 0;vertical-align:top;text-align:right;">
            <img id="logo-bracel" src="../bracel_logo.png" alt="Bracel" width="149" height="43" style="display:block;border:0;width:149px;height:43px;">
          </td>
        </tr>
        <tr>
          <td align="right" valign="bottom"
              style="padding:25px 9px 14px 0;vertical-align:bottom;text-align:right;">
            <table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">
              <!-- E-mail em nowrap (nunca parte no meio, ex.: "...com.b|r"); endereço quebra SÓ em espaço. -->
              <tr id="r-celular"><td style="padding:1px 5px 3px 0;vertical-align:top;line-height:0;"><img id="icon-celular" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-celular" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:3px;vertical-align:top;line-height:14px;text-align:left;white-space:nowrap;"></td></tr>
              <tr id="r-telefone"><td style="padding:1px 5px 3px 0;vertical-align:top;line-height:0;"><img id="icon-telefone" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-telefone" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:3px;vertical-align:top;line-height:14px;text-align:left;white-space:nowrap;"></td></tr>
              <tr id="r-email"><td style="padding:1px 5px 3px 0;vertical-align:top;line-height:0;"><img id="icon-email" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-email" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;padding-bottom:3px;vertical-align:top;line-height:14px;text-align:left;white-space:nowrap;"></td></tr>
              <tr id="r-endereco"><td style="padding:1px 5px 0 0;vertical-align:top;line-height:0;"><img id="icon-endereco" src="" width="11" height="11" alt="" style="display:block;border:0;"></td><td id="s-endereco" style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;vertical-align:top;line-height:14px;text-align:left;overflow-wrap:break-word;"></td></tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#EB7927" height="14"
        style="background-color:#EB7927;height:14px;font-size:0;line-height:0;">&nbsp;</td>
  </tr>
</table>
</div>
</div><!-- /preview-panel -->

<div class="page-footer">
  <span>Desenvolvido por <strong>BAM</strong></span>
</div>
</div><!-- /main -->

<!-- Aviso de "copiado" (toast) com a logo -->
<div id="toast" role="status" aria-live="polite" style="position:fixed;top:20px;right:20px;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(0,0,0,.08);border-left:4px solid #E8621A;border-radius:12px;padding:13px 16px;box-shadow:0 10px 34px rgba(0,0,0,.16);max-width:330px;z-index:9999;transform:translateX(120%);opacity:0;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .38s;font-family:'Inter',system-ui,Arial,sans-serif;">
  <img src="../bracel_logo.png" alt="" style="width:40px;height:auto;flex-shrink:0;">
  <div style="display:flex;flex-direction:column;gap:2px;">
    <strong id="toast-title" style="font-size:13.5px;font-weight:700;color:#0f172a;line-height:1.2;">Sua assinatura Bracel está pronta!</strong>
    <span id="toast-sub" style="font-size:11.5px;color:#64748b;line-height:1.4;"></span>
  </div>
</div>

<script>
// Cria data URI de icone SVG a partir de string SVG (somente ASCII)
function mkIcon(s) {
  return 'data:image/svg+xml;base64,' + btoa(s);
}

// Icones em SVG inline (cinza neutro #777)
var ICONS = {
  celular: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#777" stroke-width="1.3">' +
    '<rect x="3.5" y="0.5" width="7" height="13" rx="1.2"/>' +
    '<line x1="5.5" y1="2.5" x2="8.5" y2="2.5" stroke-linecap="round" stroke-width="1"/>' +
    '<circle cx="7" cy="11.5" r="0.85" fill="#777" stroke="none"/>' +
    '</svg>'
  ),
  telefone: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">' +
    '<path d="M3.2 2C2.6 2 2 2.6 2 3.3C2 5.8 4.5 9.3 6.5 11.2C8.5 13.1 12 14 12.7 14C13.4 14 14 13.4 14 12.8L12.8 11.2L11.2 12.2C10.6 12.2 9 11.2 8 10.1C7 9 6 7.4 6 6.8L7.6 5.2L5.8 2Z" fill="#777"/>' +
    '</svg>'
  ),
  email: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#777" stroke-width="1.3">' +
    '<rect x="0.5" y="2.5" width="13" height="9.5" rx="0.5"/>' +
    '<polyline points="0.5,2.5 7,8.5 13.5,2.5"/>' +
    '</svg>'
  ),
  endereco: mkIcon(
    '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">' +
    '<path d="M7 0.5C4.5 0.5 2.5 2.6 2.5 5.2C2.5 8.8 7 13.8 7 13.8C7 13.8 11.5 8.8 11.5 5.2C11.5 2.6 9.5 0.5 7 0.5Z" fill="#777"/>' +
    '<circle cx="7" cy="5.2" r="1.7" fill="white"/>' +
    '</svg>'
  )
};

document.getElementById('icon-celular').src   = ICONS.celular;
document.getElementById('icon-telefone').src  = ICONS.telefone;
document.getElementById('icon-email').src     = ICONS.email;
document.getElementById('icon-endereco').src  = ICONS.endereco;
update();

// Endereço em NO MÁXIMO 2 linhas com quebra escolhida POR NÓS: o Word ignora max-width,
// então sem quebra explícita o Outlook clássico estica o card pra caber o endereço
// inteiro em 1 linha. Curto (<= 40 chars) fica em 1 linha; longo parte no " - " mais
// perto do meio (metades equilibradas; o separador da quebra some). Fallback: espaço
// mais perto do meio. Mesmo resultado em todo cliente (Word, OWA, Apple Mail).
// Usada no EXPORT (copyHTML) e no PREVIEW (update) — sempre os dois juntos.
function splitEndereco(s) {
  s = (s || '').trim();
  if (s.length <= 40) return { l1: s, l2: '' };
  var meio = s.length / 2, pos = -1, melhor = Infinity, re = / - /g, m, d;
  while ((m = re.exec(s))) { d = Math.abs(m.index - meio); if (d < melhor) { melhor = d; pos = m.index; } }
  if (pos >= 0) return { l1: s.slice(0, pos), l2: s.slice(pos + 3) };
  melhor = Infinity; re = / /g;
  while ((m = re.exec(s))) { d = Math.abs(m.index - meio); if (d < melhor) { melhor = d; pos = m.index; } }
  if (pos >= 0) return { l1: s.slice(0, pos), l2: s.slice(pos + 1) };
  return { l1: s, l2: '' };
}

// Atualiza preview em tempo real
function update() {
  document.getElementById('s-nome').textContent = document.getElementById('f-nome').value;
  var cargo = document.getElementById('f-cargo').value.trim();
  document.getElementById('s-cargo').textContent = cargo;
  document.getElementById('s-cargo-wrap').style.display = cargo ? '' : 'none';
  // Contato vazio: esconde a linha no preview (igual ao export, que omite contato vazio)
  ['celular','telefone','email','endereco'].forEach(function(k){
    var v = document.getElementById('f-' + k).value;
    var el = document.getElementById('s-' + k);
    if (k === 'endereco') {
      // Mesma quebra em 2 linhas do export (splitEndereco), como nó <br> real
      var p = splitEndereco(v);
      el.textContent = '';
      el.appendChild(document.createTextNode(p.l1));
      if (p.l2) { el.appendChild(document.createElement('br')); el.appendChild(document.createTextNode(p.l2)); }
    } else if (k === 'telefone') {
      // Ramal ao lado do telefone, igual ao export
      var ram = (document.getElementById('f-ramal').value || '').trim();
      el.textContent = v + (v.trim() && ram ? ' - Ramal ' + ram : '');
    } else {
      el.textContent = v;
    }
    var r = document.getElementById('r-' + k);
    if (r) r.style.display = v.trim() ? '' : 'none';
  });
}
['f-nome','f-cargo','f-celular','f-telefone','f-ramal','f-email','f-endereco'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', update);
});

// Aviso "copiado" deslizante com a logo (substitui o alert)
function showToast(title, sub) {
  var t = document.getElementById('toast');
  if (!t) return;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-sub').textContent = sub || '';
  t.style.transform = 'translateX(0)';
  t.style.opacity = '1';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ t.style.transform = 'translateX(120%)'; t.style.opacity = '0'; }, 4500);
}

// Preview reflete o seletor Fundo do card (cinza / branco com borda)
function applyFundo() {
  var branco = (document.getElementById('f-fundo') || {}).value === 'branco';
  var card = document.getElementById('s-card');
  var tbl  = document.getElementById('signature');
  if (card) card.style.background = branco ? '#FFFFFF' : '#F4F4F4';
  if (tbl)  tbl.style.border = branco ? '1px solid #E0E0E0' : '0';
}
(function(){ var s = document.getElementById('f-fundo'); if (s) s.addEventListener('change', applyFundo); applyFundo(); })();

// Formatação automática de telefone brasileiro
function fmtPhone(v){
  var d=v.replace(/\D/g,'').slice(0,11);
  if(!d.length) return '';
  if(d.length<=2) return '('+d;
  if(d.length<=6) return '('+d.slice(0,2)+') '+d.slice(2);
  if(d.length<=10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
}
['f-celular','f-telefone'].forEach(function(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('input',function(){
    var formatted=fmtPhone(this.value);
    if(formatted!==this.value) this.value=formatted;
  });
});

// Autocomplete de domínio de e-mail
(function(){
  var DOMAINS = ['bracel.com.br','gmail.com','hotmail.com'];
  var input = document.getElementById('f-email');
  if(!input) return;
  var box = document.createElement('ul');
  box.style.cssText = 'position:fixed;z-index:9999;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;margin:0;padding:4px 0;list-style:none;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none;';
  document.body.appendChild(box);
  function pos(){ var r=input.getBoundingClientRect(); box.style.top=(r.bottom+4)+'px'; box.style.left=r.left+'px'; box.style.minWidth=r.width+'px'; }
  function show(){
    var val=input.value, at=val.lastIndexOf('@');
    if(at===-1){box.style.display='none';return;}
    var pre=val.slice(0,at), after=val.slice(at+1).toLowerCase();
    var hits=DOMAINS.filter(function(d){return d.indexOf(after)===0;});
    if(!hits.length){box.style.display='none';return;}
    box.innerHTML='';
    hits.forEach(function(d){
      var li=document.createElement('li');
      li.textContent=pre+'@'+d;
      li.tabIndex=0;
      li.style.cssText='padding:7px 14px;cursor:pointer;font-size:13px;color:#0f172a;white-space:nowrap;';
      function pick(e){e.preventDefault();input.value=pre+'@'+d;input.dispatchEvent(new Event('input'));box.style.display='none';input.focus();}
      li.addEventListener('mousedown',pick);
      li.addEventListener('keydown',function(e){if(e.key==='Enter')pick(e);if(e.key==='Escape'){box.style.display='none';input.focus();}});
      li.addEventListener('mouseover',function(){this.style.background='#f1f5f9';});
      li.addEventListener('mouseout',function(){this.style.background='';});
      box.appendChild(li);
    });
    pos(); box.style.display='block';
  }
  input.addEventListener('input',show);
  input.addEventListener('focus',show);
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape') box.style.display='none';
    if(e.key==='ArrowDown'&&box.style.display!=='none'){e.preventDefault();var f=box.querySelector('li');if(f)f.focus();}
  });
  document.addEventListener('click',function(e){if(e.target!==input&&!box.contains(e.target))box.style.display='none';});
  window.addEventListener('scroll',function(){if(box.style.display!=='none')pos();},true);
  window.addEventListener('resize',function(){if(box.style.display!=='none')pos();});
})();

// Ajusta o preview pra caber em telas estreitas (escala via CSS transform)
function scaleSignature(){var wrap=document.getElementById('signature-wrapper');var sig=document.getElementById('signature');if(!sig||!wrap)return;var w=wrap.getBoundingClientRect().width;var sw=parseInt(sig.getAttribute('width'))||500;if(w<sw){var s=w/sw;sig.style.transform='scale('+s+')';sig.style.transformOrigin='top left';wrap.style.height=Math.ceil(sig.offsetHeight*s)+'px';}else{sig.style.transform='';sig.style.transformOrigin='';wrap.style.height='';}}window.addEventListener('resize',scaleSignature);

// Copia HTML da assinatura — mode: 'owa'=Outlook Web | 'desktop'=Outlook Desktop |
// 'classic'=Outlook ANTIGO (rotulos de texto no lugar dos icones) | 'mac'=Mail do Mac (saida igual ao OWA)
async function copyHTML(mode) {
  var nome     = (document.getElementById('f-nome').value     || '').trim();
  var cargo    = (document.getElementById('f-cargo').value    || '').trim();
  var celular  = (document.getElementById('f-celular').value  || '').trim();
  var telefone = (document.getElementById('f-telefone').value || '').trim();
  var ramal    = (document.getElementById('f-ramal').value    || '').trim();
  var emailVal = (document.getElementById('f-email').value    || '').trim();
  var endereco = (document.getElementById('f-endereco').value || '').trim();
  var linkedin = (document.getElementById('f-linkedin').value || '').trim();
  var wamsg    = (document.getElementById('f-wamsg').value    || '').trim();

  var BASE      = 'https://bam-assessoria.github.io/Assinaturas/';
  // Fundo do card: 'cinza' (#F4F4F4, padrão aprovado) ou 'branco' (#FFFFFF + borda fina cinza),
  // escolhido no seletor do formulário — pra mostrar as duas versões pra cliente.
  // Tile 1x1 HOSPEDADO aplicado via bgcolor + background="url" + background-image em TODAS as
  // células: o OWA enxerga fundo explícito e não-invertível, mantendo a cor no dark mode.
  var BG_LIGHT  = BASE + 'bg/bg-light.png';
  var BG_WHITE  = BASE + 'bg/bg-white.png';
  var BG_ORANGE = BASE + 'bg/bg-orange.png';
  var fundoBranco = (document.getElementById('f-fundo') || {}).value === 'branco';
  var CARD_HEX    = fundoBranco ? '#FFFFFF' : '#F4F4F4';
  var CARD_TILE   = fundoBranco ? BG_WHITE : BG_LIGHT;
  var CARD_BORDER = fundoBranco ? 'border:1px solid #E0E0E0;' : '';
  // Ícones OPACOS com a cor do card já no fundo (SEM transparência): o Outlook clássico
  // (engine do Word antigo) achatava o alfa dos PNGs transparentes e mostrava só um
  // quadrado branco. Sufixo acompanha a cor do card escolhida no seletor.
  // bracel_*.png na RAIZ, 176x176 exibido a 11px (16:1 exato): a máquina da cliente tem
  // filtro (AV/proxy anti-tracking) que bloqueou os ícones de 22x22 E de 44x44 da pasta
  // /icons/, enquanto o logo (298x86, raiz) sempre baixou. Estes imitam o perfil do logo:
  // raiz do site, prefixo bracel_, ~2-3KB. URL nova também fura cache envenenado do Word.
  // Não voltar pra /icons/ pequenos no export da Bracel.
  var ICON_SUF  = fundoBranco ? '-branco' : '-cinza';
  var iCelular  = BASE + 'bracel_celular'  + ICON_SUF + '.png';
  var iTelefone = BASE + 'bracel_telefone' + ICON_SUF + '.png';
  var iEmail    = BASE + 'bracel_email'    + ICON_SUF + '.png';
  var iEndereco = BASE + 'bracel_endereco' + ICON_SUF + '.png';
  // Logo pela MESMA receita dos ícones: opaco, com a cor do card no fundo. O original era
  // 1078x300 com alfa (150 KB) exibido a 149x43 — o Word achatava o alfa (retângulo branco
  // atrás do logo no card cinza) e ainda reduzia 7:1 com o scaler ruim dele. Agora 298x86 =
  // 2x exato da caixa, sem alfa, 21 KB.
  var logoUrl   = BASE + 'bracel_logo' + ICON_SUF + '.png';
  // 'classic' = Outlook ANTIGO na máquina COM filtro de imagens: depois de 3 rodadas
  // (opacos sem alfa, 44x44, 176x176 na raiz imitando o perfil do logo) os ícones de
  // contato seguem bloqueados pelo AV/proxy da máquina da cliente — só o logo baixa.
  // Ícone vira RÓTULO DE TEXTO (sugestão da própria cliente, 17/07): texto não depende
  // de download, chega sempre, em qualquer máquina e qualquer destinatário. O logo
  // continua imagem (comprovadamente baixa lá). Os outros 3 botões seguem com ícones.
  var classic = mode === 'classic';
  var LABELS = { celular: 'Cel.', telefone: 'Tel.', email: 'E-mail', endereco: 'End.' };
  var CBG = 'background-color:' + CARD_HEX + ';background-image:url(\'' + CARD_TILE + '\');background-repeat:repeat;';
  var OBG = 'background-color:#EB7927;background-image:url(\'' + BG_ORANGE + '\');background-repeat:repeat;';

  // Contatos clicáveis: celular abre WhatsApp, telefone disca, email compõe, endereço abre o mapa.
  function onlyDigits(s){ return (s || '').replace(/\D/g, ''); }
  function telHref(s){ var d = onlyDigits(s); if(!d) return ''; if(d.length <= 11) d = '55' + d; return 'tel:+' + d; }
  function waHref(s, msg){ var d = onlyDigits(s); if(!d) return ''; if(d.length <= 11) d = '55' + d; var u = 'https://wa.me/' + d; if(msg) u += '?text=' + encodeURIComponent(msg); return u; }
  function mapsHref(s){ return s ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s) : ''; }
  function urlHref(s){ s = (s || '').trim(); if(!s) return ''; return /^https?:\/\//i.test(s) ? s : 'https://' + s; }
  // O Word (Outlook clássico) REAPLICA azul+sublinhado de hyperlink no ENVIO, descartando
  // o style da <a> (print da cliente 16/07). Formatação direta num <span> INTERNO vira
  // "direct formatting" no Word e vence o estilo Hyperlink — por isso o embrulho duplo.
  function linkTxt(href, text){
    return href
      ? '<a href="' + href + '" style="color:#333333;text-decoration:none;">'
        + '<span style="color:#333333;text-decoration:none;">' + text + '</span></a>'
      : text;
  }

  // Linha de contato ÚNICA pros 4 botões (Desktop/OWA/Mac/Antigo — no Antigo a 1ª TD
  // leva rótulo de texto em vez de ícone, resto idêntico): ícone em TD separada do texto
  // (inline desalinha no engine do Word) — mesma estrutura da pré-visualização. Estrutura
  // idêntica em todo botão = mesma renderização em todo cliente (era a maior fonte de
  // diferença celular × PC × web).
  // Todas as linhas usam valign:top + espaçamento igual (sem mistura middle/top que abria gap no OWA).
  // wrap=false → nowrap: a célula NUNCA quebra (celular, telefone e E-MAIL ficam em 1 linha;
  // a coluna alarga pro conteúdo). wrap=true (endereço): a quebra REAL vem do <br> explícito
  // do splitEndereco(); o overflow-wrap é só válvula de segurança e quebra SÓ em espaço. Sem
  // word-break:break-word, que deixava OWA/celular esmagar a coluna e partir o e-mail no
  // meio ("...com.b" + "r" na linha de baixo). O atributo nowrap reforça no Word.
  function row(icon, label, content, wrap) {
    if (!content) return '';
    var wrapCss    = wrap ? 'overflow-wrap:break-word;' : 'white-space:nowrap;';
    var nowrapAttr = wrap ? '' : ' nowrap';
    // 1ª coluna: no classic é o rótulo em texto (nada pra baixar; alinhado à direita pra
    // coluna encostar nos valores — a coluna dimensiona pelo rótulo mais largo, "E-mail");
    // nos demais modos, o ícone em TD separada (inline desalinha no engine do Word).
    var col1 = classic
      ? '<td valign="top" nowrap align="right" bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
        + ' style="padding:0 5px 3px 0;vertical-align:top;text-align:right;white-space:nowrap;'
        + 'font-size:11px;font-weight:bold;color:#777777;font-family:Arial,Helvetica,sans-serif;line-height:14px;' + CBG + '">'
        + label
        + '</td>'
      : '<td width="18" valign="top" bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
        + ' style="width:18px;padding:1px 5px 3px 0;vertical-align:top;line-height:0;' + CBG +'">'
        + '<img src="' + icon + '" width="11" height="11" alt="" border="0"'
        + ' style="display:block;border:0;width:11px;height:11px;">'
        + '</td>';
    return '<tr>'
      + col1
      + '<td valign="top"' + nowrapAttr + ' bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
      + ' style="font-size:11px;color:#333333;font-family:Arial,Helvetica,sans-serif;'
      + 'padding:0 0 3px 0;vertical-align:top;text-align:left;line-height:14px;' + CBG +wrapCss + '">'
      + content
      + '</td>'
      + '</tr>';
  }

  // Fontes do export SÓ Arial: e-mail não carrega webfont, então League Spartan/Inter só
  // existiam em máquinas que as tivessem instaladas — mais uma fonte de diferença entre PCs.
  // Cargo com overflow-wrap (quebra em espaço), NUNCA word-break — senão a coluna pode
  // ser esmagada em tela estreita e partir a palavra no meio, como acontecia com o e-mail.
  var cargoHtml = cargo
    ? '<p style="margin:4px 0 0 0;padding:0;font-size:11px;font-weight:700;'
      + 'color:#E8621A;font-family:Arial,Helvetica,sans-serif;overflow-wrap:break-word;">' + cargo + '</p>'
    : '';
  var celHtml   = celular  ? linkTxt(waHref(celular, wamsg), celular) : '';
  // Ramal é só texto ao lado do telefone (o link tel: disca o número base)
  var telTxt    = telefone + (ramal ? ' - Ramal ' + ramal : '');
  var telHtml   = telefone ? linkTxt(telHref(telefone), telTxt)      : '';
  var emailHtml = emailVal ? linkTxt('mailto:' + emailVal, emailVal) : '';
  var endParts  = splitEndereco(endereco);
  var endTxt    = endParts.l2 ? endParts.l1 + '<br>' + endParts.l2 : endParts.l1;
  var endHtml   = endereco ? linkTxt(mapsHref(endereco), endTxt)    : '';
  // Nome vira link clicável pro LinkedIn quando o campo está preenchido (mantém a mesma cor/peso).
  var liHref    = urlHref(linkedin);
  var nomeHtml  = liHref
    ? '<a href="' + liHref + '" style="color:#1a1a1a;text-decoration:none;">'
      + '<span style="color:#1a1a1a;text-decoration:none;">' + nome + '</span></a>'
    : nome;

  // Saída IDÊNTICA em owa/desktop/mac — só as instruções de onde colar mudam no aviso.
  // No 'classic' a única diferença é a 1ª TD de cada linha: rótulo de texto no lugar do ícone.
  // E-mail SEM wrap (fica sempre em 1 linha); endereço quebra apenas em espaços.
  var contatos = row(iCelular, LABELS.celular, celHtml)
    + row(iTelefone, LABELS.telefone, telHtml)
    + row(iEmail, LABELS.email, emailHtml)
    + row(iEndereco, LABELS.endereco, endHtml, true);

  // Largura = SOMA DO CONTEÚDO, sem width nem max-width: o Word (Outlook clássico)
  // transforma max-width:470 em width FIXA de 470 — comprovado no print da cliente
  // (16/07): card largo com um vão enorme no meio. Quem segura a largura é o endereço
  // partido em 2 pelo splitEndereco(); e-mail/telefones em nowrap alargam se precisarem.
  // O tile cinza-claro (CBG) vai em TODAS as células → card claro e travado contra o dark mode do OWA.
  var html = '<table cellpadding="0" cellspacing="0" border="0"'
    + ' style="border-collapse:collapse;' + CARD_BORDER + 'font-family:Arial,Helvetica,sans-serif;">'
    + '<tr>'
    + '<td bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
    + ' style="' + CBG +'padding:0;vertical-align:top;">'
    // Tabela interna SEM width: o card é content-sized (sem max-width), então não há
    // sobra pra esticar — e width:100% dentro de tabela auto ajudava o Word a inflar o card.
    + '<table cellpadding="0" cellspacing="0" border="0"'
    + ' style="border-collapse:collapse;">'
    + '<tr>'
    // NOME SEMPRE EM 1 LINHA (decisão final da cliente, 16/07/2026): white-space:nowrap no
    // <p> + atributo nowrap na TD (o Word ignora o CSS, só obedece o atributo) e SEM width
    // na coluna — no Word, width explícita VENCE o nowrap e quebrava o nome em 2 linhas
    // (print da cliente 16/07). Sem width, a coluna dimensiona pro nome inteiro.
    + '<td rowspan="2" valign="bottom" nowrap bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
    + ' style="padding:0 16px 15px 17px;vertical-align:bottom;white-space:nowrap;' + CBG +'">'
    + '<p style="margin:0;padding:0;font-size:12px;font-weight:900;color:#1a1a1a;'
    + 'font-family:Arial,Helvetica,sans-serif;line-height:1.25;white-space:nowrap;">' + nomeHtml + '</p>'
    + cargoHtml
    + '</td>'
    + '<td align="right" valign="top" bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
    + ' style="padding:8px 19px 0 0;vertical-align:top;text-align:right;' + CBG +'">'
    + '<img src="' + logoUrl + '" alt="Bracel" width="149" height="43" border="0"'
    + ' style="display:block;border:0;width:149px;height:43px;" align="right">'
    + '</td>'
    + '</tr>'
    + '<tr>'
    + '<td align="right" valign="bottom" bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
    + ' style="padding:25px 9px 14px 0;vertical-align:bottom;text-align:right;' + CBG +'">'
    + '<table cellpadding="0" cellspacing="0" border="0" align="right"'
    + ' style="border-collapse:collapse;">'
    + contatos
    + '</table>'
    + '</td>'
    + '</tr>'
    + '<tr><td colspan="2" height="4" bgcolor="' + CARD_HEX + '" background="' + CARD_TILE + '"'
    + ' style="height:4px;font-size:0;line-height:0;' + CBG +'"></td></tr>'
    + '</table>'
    + '</td>'
    + '</tr>'
    + '<tr>'
    + '<td bgcolor="#EB7927" background="' + BG_ORANGE + '" height="14"'
    + ' style="' + OBG + 'height:14px;font-size:0;line-height:0;">&nbsp;</td>'
    + '</tr>'
    + '</table>';

  try {
    await navigator.clipboard.write([
      new ClipboardItem({ 'text/html': new Blob([html], { type: 'text/html' }) })
    ]);
    var sub = mode === 'desktop'
      ? 'Cole no Outlook Desktop: Arquivo > Opções > E-mail > Assinaturas.'
      : mode === 'classic'
      ? 'Versão sem ícones (rótulos de texto, à prova de bloqueio). Cole no Outlook antigo: Arquivo > Opções > E-mail > Assinaturas.'
      : mode === 'mac'
      ? 'Cole no Mail do Mac: Mail > Ajustes > Assinaturas. Deixe DESMARCADO "Sempre coincidir com a fonte padrão da mensagem".'
      : 'Cole no Outlook Web: Configurações > E-mail > Assinatura.';
    showToast('Sua assinatura Bracel está pronta!', sub);
  } catch(e) {
    // Fallback: contenteditable preserva HTML formatado no clipboard
    var div = document.createElement('div');
    div.contentEditable = 'true';
    div.innerHTML = html;
    div.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;';
    document.body.appendChild(div);
    var sel = window.getSelection();
    var range = document.createRange();
    range.selectNodeContents(div);
    sel.removeAllRanges();
    sel.addRange(range);
    try { document.execCommand('copy'); } catch(e2) {}
    sel.removeAllRanges();
    document.body.removeChild(div);
    showToast('Sua assinatura Bracel está pronta!', 'Cole no campo de assinatura do seu e-mail.');
  }
}

</script>
</body>
</html>
